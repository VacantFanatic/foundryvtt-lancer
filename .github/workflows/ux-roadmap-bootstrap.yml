# Create or refresh the UX Roadmap 2026 GitHub Project, milestones, labels, and issues.
#
# Setup (passkey-friendly, no local gh CLI):
#   1. Create a CLASSIC PAT (not fine-grained) with project + repo scopes.
#      Fine-grained PATs cannot access user-owned Projects (GitHub docs limitation).
#   2. Add repo secret UX_ROADMAP_GH_TOKEN (see scripts/ux-roadmap/MANUAL-SETUP.md).
#   3. Run workflow manually. GITHUB_TOKEN alone cannot create user-owned Projects.
name: UX Roadmap bootstrap

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Bootstrap mode
        required: true
        default: full
        type: choice
        options:
          - full
          - issues-only
          - project-only

permissions:
  issues: write
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify token can access Projects
        env:
          GH_TOKEN: ${{ secrets.UX_ROADMAP_GH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Add repository secret UX_ROADMAP_GH_TOKEN (classic PAT with project + repo scopes)."
            echo "See scripts/ux-roadmap/MANUAL-SETUP.md"
            exit 1
          fi
          echo "Authenticated as:"
          gh api user --jq '.login' || true
          if ! gh project list --owner "@me" --limit 1 >/dev/null 2>&1; then
            echo "::error::Token cannot access GitHub Projects."
            echo "Create a CLASSIC PAT at https://github.com/settings/tokens/new"
            echo "Required scopes: project (full) + repo"
            echo "Fine-grained PATs do NOT work for user-owned Projects."
            echo "Update the UX_ROADMAP_GH_TOKEN secret and re-run."
            gh project list --owner "@me" --limit 1 || true
            exit 1
          fi
          echo "Project API access OK"

      - name: Bootstrap UX roadmap
        env:
          GH_TOKEN: ${{ secrets.UX_ROADMAP_GH_TOKEN }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          FLAGS=""
          if [ "$MODE" = "issues-only" ]; then FLAGS="--issues-only"; fi
          if [ "$MODE" = "project-only" ]; then FLAGS="--project-only"; fi
          node scripts/ux-roadmap/bootstrap.mjs $FLAGS
