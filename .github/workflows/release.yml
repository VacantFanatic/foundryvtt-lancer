name: Release Creation

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      # Required for ncipollo/release-action to create/update GitHub Releases
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Load the system.json manifest into memory
      - name: Load system manifest
        id: manifest
        uses: zoexx/github-action-json-file-properties@release
        with:
          file_path: "./src/system.json"

      # Set up variables for future use
      - name: Set up variables
        id: vars
        # Remove the 'v' from the tag for versioning
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          TAG_NAME=${GITHUB_REF_NAME}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "zip_name=lancer-$TAG_NAME.zip" >> $GITHUB_OUTPUT

      # Verify correct naming
      - name: Verify correct naming
        run: |
          expected_tag="v${{ steps.vars.outputs.version }}"
          actual_tag="${{ steps.vars.outputs.tag_name }}"
          if [[ "$expected_tag" != "$actual_tag" ]]; then
            echo "The system.json version does not match tag name."
            echo "expected tag: $expected_tag"
            echo "actual tag: $actual_tag"
            echo "Please fix this and push the tag again."
            exit 1
          fi

      # Verify repository links are pinned to this fork
      - name: Verify manifest release links
        run: |
          REPO_BASE="https://github.com/VacantFanatic/foundryvtt-lancer"
          VERSION="${{ steps.vars.outputs.version }}"
          MANIFEST_URL="$(python3 -c "import json;print(json.load(open('src/system.json', encoding='utf-8'))['url'])")"
          MANIFEST_MANIFEST="$(python3 -c "import json;print(json.load(open('src/system.json', encoding='utf-8'))['manifest'])")"
          MANIFEST_DOWNLOAD="$(python3 -c "import json;print(json.load(open('src/system.json', encoding='utf-8'))['download'])")"
          MANIFEST_README="$(python3 -c "import json;print(json.load(open('src/system.json', encoding='utf-8'))['readme'])")"
          MANIFEST_BUGS="$(python3 -c "import json;print(json.load(open('src/system.json', encoding='utf-8'))['bugs'])")"
          MANIFEST_CHANGELOG="$(python3 -c "import json;print(json.load(open('src/system.json', encoding='utf-8'))['changelog'])")"

          expected_manifest="${REPO_BASE}/releases/latest/download/system.json"
          expected_download="${REPO_BASE}/releases/download/v${VERSION}/lancer-v${VERSION}.zip"
          expected_readme="${REPO_BASE}/blob/master/README.md"
          expected_bugs="${REPO_BASE}/issues/new/choose"
          expected_changelog="${REPO_BASE}/blob/master/CHANGELOG.md"

          [[ "$MANIFEST_URL" == "$REPO_BASE" ]] || { echo "Invalid url: $MANIFEST_URL"; exit 1; }
          [[ "$MANIFEST_MANIFEST" == "$expected_manifest" ]] || { echo "Invalid manifest link: $MANIFEST_MANIFEST"; exit 1; }
          [[ "$MANIFEST_DOWNLOAD" == "$expected_download" ]] || { echo "Invalid download link: $MANIFEST_DOWNLOAD"; exit 1; }
          [[ "$MANIFEST_README" == "$expected_readme" ]] || { echo "Invalid readme link: $MANIFEST_README"; exit 1; }
          [[ "$MANIFEST_BUGS" == "$expected_bugs" ]] || { echo "Invalid bugs link: $MANIFEST_BUGS"; exit 1; }
          [[ "$MANIFEST_CHANGELOG" == "$expected_changelog" ]] || { echo "Invalid changelog link: $MANIFEST_CHANGELOG"; exit 1; }

      # Set up Node
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # Install Dependencies
      - name: Install Dependencies
        run: npm ci

      # Build the code and packs for distribution
      - name: Build For Distribution
        run: npm run build

      # Package the built files
      - name: Package Files
        run: |
          cd dist
          zip -r "${{ steps.vars.outputs.zip_name }}" *

      # Create a release for this specific version
      - name: Create Release with Files
        id: create_version_release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: ${{ steps.vars.outputs.tag_name }}
          draft: true
          prerelease: true
          omitDraftDuringUpdate: true
          omitPrereleaseDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "./dist/system.json, ./dist/${{ steps.vars.outputs.zip_name }}"
          tag: ${{ steps.vars.outputs.tag_name }}
          # TODO: can we automatically extract the changelog for this release?
          body: |

            [Full changelog](https://github.com/VacantFanatic/foundryvtt-lancer/blob/master/CHANGELOG.md)
